name: AlphaSift 定时选股

on:
  schedule:
    - cron: '0 2 * * 1-5'   # UTC 2:00 = 北京时间 10:00
  workflow_dispatch:

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc g++

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install akshare pandas numpy tqdm rich typer
          pip install .

      - name: 验证安装
        run: |
          python -c "import sys; import alphasift.cli as cli; sys.argv=['alphasift','quickstart']; cli.main()"

      - name: 执行选股
  run: |
    cd $GITHUB_WORKSPACE
    echo "当前工作目录: $(pwd)"
    mkdir -p reports
    echo "开始选股（策略: balanced_alpha，数据源: baostock）..."
    python -c "import sys; import alphasift.cli as cli; sys.argv=['alphasift','screen','balanced_alpha','--no-llm','--source','baostock','--top','10']; cli.main()" 2>&1 | tee reports/balanced_alpha_$(date +'%Y%m%d_%H%M').txt
    echo "选股执行完毕，退出码: $?"

      - name: 发送飞书通知
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        if: env.FEISHU_WEBHOOK_URL != ''
        run: |
          # 检查是否有选股结果
          if [ -f reports/top10.txt ] && [ -s reports/top10.txt ]; then
            # 构建消息内容
            CONTENT="📊 **AlphaSift 双低选股结果**\n日期: $(date '+%Y-%m-%d %H:%M')\n策略: dual_low (低PE+低PB)\n\n"
            CONTENT="${CONTENT}\`\`\`\n排名  代码    名称      得分  价格   PE    PB\n"
            CONTENT="${CONTENT}$(cat reports/top10.txt)\n"
            CONTENT="${CONTENT}\`\`\`\n💡 完整报告可查看 GitHub Actions Artifacts"
            
            # 发送到飞书
            curl -X POST -H "Content-Type: application/json" \
              -d "{\"msg_type\":\"text\",\"content\":{\"text\":\"${CONTENT}\"}}" \
              $FEISHU_WEBHOOK_URL
          else
            # 发送失败提醒
            curl -X POST -H "Content-Type: application/json" \
              -d "{\"msg_type\":\"text\",\"content\":{\"text\":\"⚠️ AlphaSift 今日选股未产生结果，请检查运行日志。\"}}" \
              $FEISHU_WEBHOOK_URL
          fi

      - name: 上传报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: alphasift-reports
          path: reports/
