name: AlphaSift 定时选股

on:
  schedule:
    # 每个工作日上午 9:30（北京时间）运行，UTC 1:30
    - cron: '30 1 * * 1-5'
  workflow_dispatch:  # 支持手动触发

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -e .
          pip install -r requirements.txt

      - name: 执行选股（双低策略，不带LLM排序）
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          # 如果有 Tushare 或其他数据源，可在此添加
        run: |
          mkdir -p reports
          alphasift screen dual_low --no-llm --top 20 > reports/dual_low_$(date +'%Y%m%d_%H%M').txt
          # 如果希望使用 LLM 排序，请去掉 --no-llm 参数

      - name: 上传报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: alphasift-reports
          path: reports/
