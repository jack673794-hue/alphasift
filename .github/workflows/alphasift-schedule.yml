name: AlphaSift 定时选股

on:
  schedule:
    - cron: '0 2 * * 1-5'   # UTC 2:00 = 北京时间 10:00
  workflow_dispatch:  # 支持手动触发

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装系统依赖（akshare 需要）
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc g++

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install akshare pandas numpy tqdm rich typer
          pip install .   # 正式安装（非开发模式）

      - name: 执行选股（双低策略，不带LLM排序）
        run: |
          mkdir -p reports
          python -m alphasift.cli screen dual_low --no-llm --top 20 > reports/dual_low_$(date +'%Y%m%d_%H%M').txt 2>&1

      - name: 上传报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: alphasift-reports
          path: reports/
