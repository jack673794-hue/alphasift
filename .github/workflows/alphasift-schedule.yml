name: AlphaSift 定时选股

on:
  schedule:
    - cron: '0 2 * * 1-5'   # UTC 2:00 = 北京时间 10:00
  workflow_dispatch:

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc g++

      - name: 安装 Python 依赖（完全参照本地）
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install akshare pandas numpy tqdm rich typer
          pip install .

      - name: 验证安装（参照本地测试）
        run: |
          python -c "import sys; import alphasift.cli as cli; sys.argv=['alphasift','quickstart']; cli.main()"

      - name: 执行选股（完全参照本地命令）
        run: |
          mkdir -p reports
          python -c "import sys; import alphasift.cli as cli; sys.argv=['alphasift','screen','dual_low','--no-llm','--source','akshare','--top','10']; cli.main()" 2>&1 | tee reports/dual_low_$(date +'%Y%m%d_%H%M').txt

      - name: 上传报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: alphasift-reports
          path: reports/
