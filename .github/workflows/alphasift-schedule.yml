name: AlphaSift 定时选股

on:
  schedule:
    - cron: '0 2 * * 1-5'   # UTC 2:00 = 北京时间 10:00
  workflow_dispatch:

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc g++

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install akshare pandas numpy tqdm rich typer
          pip install .

      - name: 验证安装
        run: |
          python -c "import alphasift; print('✅ alphasift 导入成功')"
          python -c "import akshare; print('✅ akshare 导入成功')"

      - name: 执行选股（使用免费数据源）
        run: |
          cd $GITHUB_WORKSPACE
          echo "当前工作目录: $(pwd)"
          ls -la
          mkdir -p reports
          echo "reports 目录已创建"
          python -m alphasift.cli screen dual_low --no-llm --source akshare --top 10 > reports/dual_low_$(date +'%Y%m%d_%H%M').txt 2>&1
          echo "选股执行完毕，退出码: $?"
          # 如果文件生成成功，打印前几行以便查看
          if [ -f reports/dual_low_*.txt ]; then
            head -n 20 reports/dual_low_*.txt
          fi

      - name: 上传报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: alphasift-reports
          path: reports/
